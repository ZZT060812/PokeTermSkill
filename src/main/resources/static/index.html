<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Remote AI Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- Login screen -->
<div id="login-screen">
    <div class="login-box">
        <h1>Remote AI Terminal</h1>
        <p>Enter the token shown in your server console.</p>
        <input type="password" id="token-input" placeholder="Token" autocomplete="off">
        <button id="connect-btn">Connect</button>
        <p id="login-error" class="error"></p>
    </div>
</div>

<!-- Main app -->
<div id="app-screen" style="display:none">
    <header id="toolbar">
        <button id="toggle-files" title="Toggle file browser">☰ Files</button>
        <span id="connection-status" class="status-connected">● Connected</span>
        <button id="disconnect-btn" title="Disconnect">✕</button>
    </header>

    <div id="main">
        <aside id="sidebar">
            <div id="file-tree"></div>
        </aside>
        <div id="terminal-container">
            <div id="terminal"></div>
        </div>
    </div>
</div>

<!-- Context menu -->
<div id="context-menu" class="context-menu" style="display:none">
    <div class="ctx-item" data-action="new-file">New File</div>
    <div class="ctx-item" data-action="new-dir">New Folder</div>
    <div class="ctx-item" data-action="delete">Delete</div>
    <div class="ctx-item" data-action="download">Download</div>
</div>

<!-- File editor modal -->
<div id="editor-modal" class="modal" style="display:none">
    <div class="modal-box">
        <div class="modal-header">
            <span id="editor-path"></span>
            <button id="editor-close">✕</button>
        </div>
        <textarea id="editor-content"></textarea>
        <div class="modal-footer">
            <span id="editor-truncated" class="warning" style="display:none">File truncated (too large)</span>
            <button id="editor-save">Save</button>
        </div>
    </div>
</div>

<!-- New item modal -->
<div id="new-modal" class="modal" style="display:none">
    <div class="modal-box modal-sm">
        <div class="modal-header">
            <span id="new-label">New File</span>
            <button id="new-close">✕</button>
        </div>
        <input type="text" id="new-name" placeholder="Name">
        <div class="modal-footer">
            <button id="new-create">Create</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script src="/app.js"></script>
<script src="/terminal.js"></script>
<script src="/filemanager.js"></script>
</body>
</html>
