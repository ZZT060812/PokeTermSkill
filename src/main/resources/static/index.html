<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PokeTerm</title>
    <link rel="stylesheet" href="/style.css?v=4">
</head>
<body>

<!-- Login -->
<div id="login-screen">
    <div class="login-box">
        <h1>PokeTerm</h1>
        <p>Enter token to connect.</p>
        <input type="password" id="token-input" placeholder="Token" autocomplete="off">
        <button id="connect-btn">Connect</button>
        <p id="login-error" class="error"></p>
    </div>
</div>

<!-- App -->
<div id="app-screen" style="display:none">
    <header id="toolbar">
        <button id="toggle-files">Files</button>
        <span id="connection-status" class="status-connected">● Connected</span>
        <button id="disconnect-btn">✕</button>
    </header>

    <div id="main">
        <aside id="sidebar">
            <div id="file-tree"></div>
        </aside>
        <div id="terminal-container"></div>
    </div>

    <!-- Context menu -->
    <div id="context-menu" class="context-menu" style="display:none">
        <div class="ctx-item" data-action="new-file">New File</div>
        <div class="ctx-item" data-action="new-dir">New Folder</div>
        <div class="ctx-item" data-action="delete">Delete</div>
        <div class="ctx-item" data-action="download">Download</div>
    </div>

    <!-- Editor modal -->
    <div id="editor-modal" class="modal" style="display:none">
        <div class="modal-box">
            <div class="modal-header">
                <span id="editor-path"></span>
                <button id="editor-close">✕</button>
            </div>
            <textarea id="editor-content"></textarea>
            <div class="modal-footer">
                <span id="editor-truncated" class="warning" style="display:none">File too large (truncated)</span>
                <button id="editor-save">Save</button>
            </div>
        </div>
    </div>

    <!-- New item modal -->
    <div id="new-modal" class="modal" style="display:none">
        <div class="modal-box modal-sm">
            <div class="modal-header">
                <span id="new-label">New File</span>
                <button id="new-close">✕</button>
            </div>
            <input type="text" id="new-name" placeholder="Name">
            <div class="modal-footer">
                <button id="new-create">Create</button>
            </div>
        </div>
    </div>
</div>

<script src="/app.js?v=4"></script>
<script src="/output.js?v=4"></script>
<script src="/filemanager.js?v=4"></script>
</body>
</html>
